<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="display-container">
            <input type="text" class="display-show" id="display" value="45+28" onclick="calculate()">
            <p class="result-hide" id="result">= 73</p>
        </div>

        <div class="input-area">
            <div class="buttons-container">
                <button class="operation-button"   onclick="cleanDisplay()">C</button>
                <button class="operation-button"   onclick="addOnDisplay(`(`)">()</button>
                <button class="operation-button"   onclick="addOnDisplay(`%*`)">%</button>
                <button class="operation-button"   onclick="addOnDisplay(`+`)">+</button>
                <button class="number-button"      onclick="addOnDisplay(`7`)">7</button>
                <button class="number-button"      onclick="addOnDisplay(`8`)">8</button>
                <button class="number-button"      onclick="addOnDisplay(`9`)">9</button>
                <button class="operation-button"   onclick="addOnDisplay(`-`)">-</button>
                <button class="number-button"      onclick="addOnDisplay(`4`)">4</button>
                <button class="number-button"      onclick="addOnDisplay(`5`)">5</button>
                <button class="number-button"      onclick="addOnDisplay(`6`)">6</button>
                <button class="operation-button"   onclick="addOnDisplay(`*`)">*</button>
                <button class="number-button"      onclick="addOnDisplay(`1`)">1</button>
                <button class="number-button"      onclick="addOnDisplay(`2`)">2</button>
                <button class="number-button"      onclick="addOnDisplay(`3`)">3</button>
                <button class="operation-button"   onclick="addOnDisplay(`/`)">/</button>
                <button class="operation-button"   onclick="eraseFromDisplay()">E</button>
                <button class="number-button"      onclick="addOnDisplay(`0`)">0</button>
                <button class="operation-button"   onclick="addOnDisplay(`.`)">,</button>
                <button class="operation-button"   onclick="getResult()">=</button>
            </div>
        </div>
    </div>

    <p class="github-username">@pierry-savio</p>

    <script src="script.js"></script>
</body>
</html>
